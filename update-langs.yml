name: Update Language SVG

on:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 3 * * *"   # runs daily at 03:00 UTC
  workflow_dispatch:        # allows manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update-svg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate languages.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: KodEx-SA
          OUTPUT_PATH: languages.svg
        run: python generate_lang_svg.py

      - name: Commit updated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add languages.svg
          git diff --cached --quiet || git commit -m "chore: update language stats svg [skip ci]"
          git push
