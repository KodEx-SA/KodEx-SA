name: Update Profile SVGs

on:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-svgs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate languages.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: KodEx-SA
          OUTPUT_PATH: languages.svg
        run: python generate_lang_svg.py

      - name: Generate github-stats.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: KodEx-SA
          STATS_OUTPUT_PATH: github-stats.svg
        run: python generate_stats_svg.py

      - name: Generate github-streak.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: KodEx-SA
          STREAK_OUTPUT_PATH: github-streak.svg
        run: python generate_streak_svg.py

      - name: Commit updated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add languages.svg github-stats.svg github-streak.svg
          git diff --cached --quiet || git commit -m "chore: update profile svgs [skip ci]"
          git push